services:
  live-location-receiver:
    build:
      context: .
    container_name: lh2gpx-live-receiver
    restart: unless-stopped
    environment:
      BIND_HOST: ${BIND_HOST:-0.0.0.0}
      PORT: ${PORT:-8080}
      PUBLIC_HOSTNAME: ${PUBLIC_HOSTNAME:-localhost}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
      LIVE_LOCATION_BEARER_TOKEN: ${LIVE_LOCATION_BEARER_TOKEN:-}
      DATA_DIR: ${DATA_DIR:-/app/data}
      SQLITE_PATH: ${SQLITE_PATH:-/app/data/receiver.sqlite3}
      RAW_PAYLOAD_NDJSON_PATH: ${RAW_PAYLOAD_NDJSON_PATH:-/app/data/raw-payloads.ndjson}
      LEGACY_REQUEST_NDJSON_PATH: ${LEGACY_REQUEST_NDJSON_PATH:-/app/data/live-location.ndjson}
      ENABLE_RAW_PAYLOAD_NDJSON: ${ENABLE_RAW_PAYLOAD_NDJSON:-true}
      LOCAL_TIMEZONE: ${LOCAL_TIMEZONE:-UTC}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      REQUEST_BODY_MAX_BYTES: ${REQUEST_BODY_MAX_BYTES:-262144}
      POINTS_PAGE_SIZE_DEFAULT: ${POINTS_PAGE_SIZE_DEFAULT:-50}
      POINTS_PAGE_SIZE_MAX: ${POINTS_PAGE_SIZE_MAX:-250}
      RATE_LIMIT_REQUESTS_PER_MINUTE: ${RATE_LIMIT_REQUESTS_PER_MINUTE:-0}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-true}
      LOGS_DIR: ${LOGS_DIR:-/app/logs}
    ports:
      - "127.0.0.1:${PORT:-8080}:${PORT:-8080}"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import os, urllib.request; urllib.request.urlopen(f'http://127.0.0.1:{os.getenv(\\\"PORT\\\", \\\"8080\\\")}/readyz', timeout=5).read()\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2.8.4
    container_name: lh2gpx-live-receiver-caddy
    restart: unless-stopped
    depends_on:
      live-location-receiver:
        condition: service_healthy
    environment:
      PUBLIC_HOSTNAME: ${PUBLIC_HOSTNAME:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
