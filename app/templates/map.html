{% extends "base.html" %}
{% block content %}

<div class="page-header">
  <div class="page-header-copy">
    <p class="page-kicker">Visualisierung</p>
    <h2>Interaktive Karte</h2>
  </div>
</div>

<!-- Assets -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet-heat@0.2.0/dist/leaflet-heat.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/leaflet-heat@0.2.0/dist/leaflet-heat.js"></script>
<script src="/static/js/map-controller.js"></script>

<article class="panel">
  <div class="map-filter-panel">
    <div class="filter-group">
      <label for="time-range-select">Zeitraum</label>
      <select id="time-range-select" aria-label="Zeitraum wählen">
        <option value="5m">Letzte 5 Min.</option>
        <option value="15m">Letzte 15 Min.</option>
        <option value="30m">Letzte 30 Min.</option>
        <option value="1h" selected>Letzte 1 Std.</option>
        <option value="3h">Letzte 3 Std.</option>
        <option value="6h">Letzte 6 Std.</option>
        <option value="12h">Letzte 12 Std.</option>
        <option value="24h">Letzte 24 Std.</option>
        <option value="7d">Letzte 7 Tage</option>
        <option value="all">Gesamt (Max. 2000 Punkte)</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="session-select">Session</label>
      <select id="session-select" aria-label="Session wählen">
        <option value="">Alle Sessions</option>
        {% for session in sessions %}
        <option value="{{ session.session_id }}">{{ short_id(session.session_id, 16) }} ({{ session.points_count }} Pkt.)</option>
        {% endfor %}
      </select>
    </div>

    <div class="filter-group" style="flex-direction: row; align-items: center; gap: 10px; margin-left: 15px;">
      <input type="checkbox" id="auto-center-toggle" checked style="width: auto; cursor: pointer;" aria-label="Letztem Punkt folgen">
      <label for="auto-center-toggle" style="margin: 0; cursor: pointer; white-space: nowrap;">Letzter Punkt folgen</label>
    </div>

    <div class="filter-actions" style="align-self: flex-end; margin-left: auto; display: flex; gap: 10px; align-items: center;">
      <label for="polling-interval" style="margin: 0; font-size: 0.85rem;">Update:</label>
      <select id="polling-interval" aria-label="Update-Interval" style="padding: 5px 8px; border: 1px solid var(--text-muted); border-radius: 4px;">
        <option value="5000" selected>5s</option>
        <option value="10000">10s</option>
        <option value="15000">15s</option>
        <option value="30000">30s</option>
        <option value="60000">1min</option>
      </select>
      <button id="dark-mode-btn" class="button-link secondary" title="Dark Mode" aria-label="Dark Mode Toggle">🌙</button>
      <button id="fullscreen-btn" class="button-link secondary" title="Fullscreen" aria-label="Fullscreen">⛶</button>
      <button id="refresh-map-btn" class="button-link primary">
        <span id="btn-text">Aktualisieren</span>
        <span id="btn-spinner" style="display: none;">⌛ Lade...</span>
      </button>
      <span class="status-badge" id="api-status" style="padding: 5px 10px; font-size: 0.8rem;">● OFFLINE</span>
    </div>
  </div>

  <div id="map-container" style="height: 500px; border-radius: 12px; overflow: hidden;"></div>
  <p id="map-stats-text" class="eyebrow" style="margin-top: 15px; color: var(--text-muted);">Initialisiere Karte...</p>
</article>

<article class="panel">
  <div class="panel-header">
    <div>
      <p class="eyebrow">Echtzeit-Übertragung</p>
      <h3>Live-Punkt-Log</h3>
    </div>
    <div class="filter-group" style="flex-direction: row; align-items: center; gap: 10px; flex-wrap: wrap;">
      <label for="log-search" style="margin: 0;">Suche:</label>
      <input type="text" id="log-search" placeholder="Koordinaten/Zeit..." aria-label="Log durchsuchen" style="padding: 5px 10px; width: 200px; border: 1px solid var(--text-muted); border-radius: 4px;">
      <button id="export-geojson" class="button-link secondary" title="GeoJSON Export" style="padding: 5px 10px; font-size: 0.8rem;">📥 GeoJSON</button>
      <label for="log-limit" style="margin: 0;">Zeigen:</label>
      <input type="number" id="log-limit" value="100" min="1" max="1000" aria-label="Log Zeilen Limit" style="width: 80px; padding: 5px 10px;">
      <span class="status-badge info" id="live-indicator">LIVE</span>
    </div>
  </div>

  <div class="table-panel" style="max-height: 400px; overflow-y: auto; background: #0f172a; border-radius: var(--radius-sm);">
    <table style="min-width: 100%; border-collapse: separate; border-spacing: 0;">
      <thead style="position: sticky; top: 0; z-index: 10; background: #1e293b;">
        <tr style="color: #94a3b8; font-size: 0.75rem;">
          <th style="background: #1e293b; border-bottom: 1px solid #334155;">Datum</th>
          <th style="background: #1e293b; border-bottom: 1px solid #334155;">Uhrzeit</th>
          <th style="background: #1e293b; border-bottom: 1px solid #334155;">Geodaten (Lat, Lon)</th>
          <th style="background: #1e293b; border-bottom: 1px solid #334155;">Genauigkeit</th>
        </tr>
      </thead>
      <tbody id="live-log-body" style="font-family: 'IBM Plex Mono', monospace; font-size: 0.85rem; color: #e2e8f0;">
        <tr><td colspan="4" style="text-align: center; padding: 40px; color: #64748b;">Warte auf Daten-Ingest...</td></tr>
      </tbody>
    </table>
  </div>
</article>

<script>
  document.addEventListener('DOMContentLoaded', initMap);

  // Keyboard Shortcuts
  document.addEventListener('keydown', (e) => {
    if (e.code === 'KeyR' && !e.ctrlKey) document.getElementById('refresh-map-btn').click();
    if (e.code === 'KeyE' && !e.ctrlKey) document.getElementById('export-geojson').click();
    if (e.code === 'KeyF' && !e.ctrlKey) document.getElementById('fullscreen-btn').click();
  });

  // Fullscreen Toggle
  document.getElementById('fullscreen-btn').onclick = () => {
    const container = document.getElementById('map-container');
    if (!document.fullscreenElement) {
      container.requestFullscreen().catch(err => console.log(err));
    } else {
      document.exitFullscreen();
    }
  };

  // GeoJSON Export
  document.getElementById('export-geojson').onclick = () => {
    const rows = document.querySelectorAll('#live-log-body tr');
    const features = [];
    rows.forEach(row => {
      const lat = parseFloat(row.dataset.lat);
      const lon = parseFloat(row.dataset.lon);
      if (!isNaN(lat) && !isNaN(lon)) {
        features.push({
          type: 'Feature',
          geometry: { type: 'Point', coordinates: [lon, lat] },
          properties: { time: row.dataset.time, accuracy: row.cells[3].textContent }
        });
      }
    });

    const geojson = { type: 'FeatureCollection', features };
    const blob = new Blob([JSON.stringify(geojson)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `track-${new Date().toISOString().split('T')[0]}.geojson`;
    a.click();
  };
</script>
{% endblock %}
