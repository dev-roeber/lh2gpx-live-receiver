<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>LH2GPX Live Receiver</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛰️</text></svg>">
  <style>
    body {
      background: #000;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
    }
    .home-wrap { width: 100%; max-width: 520px; text-align: center; }
    .home-icon {
      width: 72px; height: 72px;
      border-radius: 20px;
      background: var(--mint);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      margin: 0 auto 24px;
    }
    .home-wrap h1 {
      font-size: clamp(1.8rem, 5vw, 2.4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      margin: 0 0 8px;
    }
    .home-wrap p {
      color: var(--text-2);
      font-size: 0.95rem;
      margin: 0 0 32px;
      line-height: 1.6;
    }
    .home-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }
    .home-actions a {
      padding: 12px 24px;
      border-radius: 999px;
      font-weight: 600;
      font-size: 0.9rem;
      transition: opacity 0.15s, transform 0.1s;
    }
    .home-actions a:active { transform: scale(0.97); }
    .home-actions .primary  { background: var(--mint); color: #000; }
    .home-actions .secondary { background: var(--surface-1); color: var(--text-2); border: 1px solid var(--border); }
    .home-actions a:hover { opacity: 0.8; text-decoration: none; }
    .home-info {
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-align: left;
    }
    .home-info h2 { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-3); margin: 0 0 12px; }
    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
    .info-item {
      background: var(--surface-2);
      border-radius: var(--radius-sm);
      padding: 12px;
    }
    .info-item strong { display: block; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-3); margin-bottom: 6px; }
    .info-item span { font-size: 0.88rem; color: var(--text); }
    .home-links {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--separator);
      display: flex;
      flex-wrap: wrap;
      gap: 6px 14px;
      justify-content: center;
    }
    .home-links a { font-size: 0.78rem; color: var(--text-2); }
  </style>
</head>
<body>
  <div class="home-wrap">
    <div class="home-icon">🛰️</div>
    <h1>LH2GPX Live Receiver</h1>
    <p>Echtzeit GPS-Datenempfänger mit Dashboard und REST-API</p>

    <div class="home-actions">
      <a href="/dashboard" class="primary">Zum Dashboard</a>
      <a href="/docs" class="secondary">API-Dokumentation</a>
    </div>

    <div class="home-info">
      <h2>System-Status</h2>
      <div class="info-grid">
        <div class="info-item">
          <strong>Health</strong>
          <span class="status-badge ok">Operational</span>
        </div>
        <div class="info-item">
          <strong>API Endpoints</strong>
          <span>{{ endpoint_count }}</span>
        </div>
        <div class="info-item">
          <strong>Version</strong>
          <span>{{ app_version }}</span>
        </div>
        <div class="info-item">
          <strong>Region</strong>
          <span>UTC</span>
        </div>
      </div>

      <div class="home-links">
        <a href="/dashboard">Dashboard</a>
        <a href="/health">Health Check</a>
        <a href="/readyz">Readiness</a>
        <a href="/docs">API Docs</a>
        <a href="/openapi.json">OpenAPI Schema</a>
      </div>
    </div>
  </div>
</body>
</html>
